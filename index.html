<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1a1a1a;
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 20px; }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn:active { opacity: 0.8; }

    .btn-danger {
      background: #dc2626;
    }

    .btn-success {
      background: #16a34a;
    }

    /* LIBRARY PAGE */
    #library-page { padding: 20px; }

    .empty-state {
      text-align: center;
      color: #999;
      margin-top: 80px;
      font-size: 16px;
      line-height: 2;
    }

    .listing-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .listing-card h2 { font-size: 16px; margin-bottom: 6px; }
    .listing-card p { font-size: 13px; color: #666; }

    .listing-card .thumb-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
    }

    .listing-card .thumb-row img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    /* CAMERA PAGE */
    #camera-page {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #000;
    }

    #video {
      width: 100%;
      height: calc(100vh - 180px);
      object-fit: cover;
    }

    .camera-controls {
      background: #111;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .camera-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-size: 14px;
    }

    .shutter-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .shutter-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: white;
      border: 4px solid #888;
      cursor: pointer;
    }

    .shutter-btn:active { opacity: 0.7; }

    .new-item-btn {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .done-btn {
      background: #16a34a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .photo-count {
      color: #fbbf24;
      font-size: 13px;
      text-align: center;
    }

    /* REVIEW PAGE */
    #review-page {
      display: none;
      padding: 20px;
    }

    #review-page h2 {
      margin-bottom: 6px;
      font-size: 18px;
    }

    #review-page .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .review-group {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .review-group h3 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #444;
    }

    .review-group .thumb-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .review-group .thumb-row img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .review-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .review-actions button {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    .generate-bar {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 16px 20px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cost-estimate {
      font-size: 13px;
      color: #666;
      text-align: center;
    }

    /* DETAIL PAGE */
    #detail-page {
      display: none;
      padding: 20px;
    }

    #detail-page .thumb-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    #detail-page .thumb-row img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .field-label {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
      margin-top: 16px;
    }

    .field-value {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
      font-family: sans-serif;
      resize: vertical;
    }

    .copy-btn {
      margin-top: 8px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .back-btn {
      background: none;
      border: none;
      color: #2563eb;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;
    }

    .status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .status-draft { background: #fef3c7; color: #92400e; }
    .status-ready { background: #d1fae5; color: #065f46; }

    canvas { display: none; }
  </style>
</head>
<body>

  <!-- LIBRARY PAGE -->
  <div id="library-page">
    <header>
      <h1>My Listings</h1>
      <button class="btn" onclick="goToCamera()">📷 Take Photos</button>
    </header>
    <div id="library-content" style="padding:20px;">
      <div class="empty-state">
        No listings yet.<br>Tap "Take Photos" to start.
      </div>
    </div>
  </div>

  <!-- CAMERA PAGE -->
  <div id="camera-page">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="camera-controls">
      <div class="camera-top-row">
        <span id="item-label">📦 Item 1</span>
        <button class="done-btn" onclick="doneCapturing()">Done ✓</button>
      </div>
      <div class="photo-count" id="photo-count">0 photos taken</div>
      <div class="shutter-row">
        <button class="new-item-btn" onclick="newItem()">＋ New Item</button>
        <button class="shutter-btn" onclick="takePhoto()"></button>
      </div>
    </div>
  </div>

  <!-- REVIEW PAGE -->
  <div id="review-page">
    <button class="back-btn" onclick="showPage('camera-page'); startCamera()">← Back to Camera</button>
    <h2>Review Groupings</h2>
    <p class="subtitle">Check that photos are grouped correctly. Fix anything before generating listings.</p>
    <div id="review-groups"></div>
    <div class="generate-bar">
      <div class="cost-estimate" id="cost-estimate"></div>
      <button class="btn btn-success" onclick="generateListings()">✨ Generate Listings</button>
    </div>
  </div>

  <!-- DETAIL PAGE -->
  <div id="detail-page">
    <header>
      <button class="back-btn" style="color:white;" onclick="showPage('library-page'); renderLibrary()">← Library</button>
      <h1 style="font-size:16px;">Edit Listing</h1>
      <div></div>
    </header>
    <div style="padding:20px;">
      <span class="status-badge" id="detail-status"></span>
      <div id="detail-photos" class="thumb-row"></div>
      <div class="field-label">Title</div>
      <input class="field-value" id="detail-title" type="text" style="height:44px;">
      <div class="field-label">Description</div>
      <textarea class="field-value" id="detail-description" rows="8"></textarea>
      <button class="copy-btn" onclick="copyListing()">📋 Copy Listing</button>
    </div>
  </div>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────
    const API_KEY = localStorage.getItem('anthropic_key') || '';
    const MAX_PHOTOS_PER_ITEM = 3; // only send 3 photos to Claude per item to save cost
    const COST_PER_IMAGE = 0.004;  // rough estimate in dollars

    // ─── STATE ────────────────────────────────────────────────
    let sessions = [];      // groups of photos from current capture session
    let currentItem = 0;    // which item we're currently photographing
    let listings = [];      // saved listings in the library
    let currentListing = null;

    // ─── PAGE NAVIGATION ──────────────────────────────────────
    function showPage(id) {
      ['library-page','camera-page','review-page','detail-page'].forEach(p => {
        document.getElementById(p).style.display = 'none';
      });
      const el = document.getElementById(id);
      el.style.display = (id === 'camera-page') ? 'flex' : 'block';
    }

    // ─── LIBRARY ──────────────────────────────────────────────
    function renderLibrary() {
      const container = document.getElementById('library-content');
      if (listings.length === 0) {
        container.innerHTML = '<div class="empty-state">No listings yet.<br>Tap "Take Photos" to start.</div>';
        return;
      }
      container.innerHTML = listings.map((l, i) => `
        <div class="listing-card" onclick="openListing(${i})">
          <span class="status-badge ${l.status === 'ready' ? 'status-ready' : 'status-draft'}">
            ${l.status === 'ready' ? '✓ Ready' : '⏳ Draft'}
          </span>
          <h2>${l.title || 'Untitled Item'}</h2>
          <p>${(l.description || '').substring(0, 100)}${l.description && l.description.length > 100 ? '...' : ''}</p>
          <div class="thumb-row">
            ${l.photos.map(p => `<img src="${p}">`).join('')}
          </div>
        </div>
      `).join('');
    }

    // ─── CAMERA ───────────────────────────────────────────────
    let stream = null;

    async function goToCamera() {
      sessions = [];
      currentItem = 0;
      sessions.push({ photos: [] });
      showPage('camera-page');
      await startCamera();
      updateCameraUI();
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }, // use back camera
          audio: false
        });
        document.getElementById('video').srcObject = stream;
      } catch (e) {
        alert('Could not access camera: ' + e.message);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function takePhoto() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      sessions[currentItem].photos.push(dataUrl);
      updateCameraUI();
    }

    function newItem() {
      currentItem++;
      sessions.push({ photos: [] });
      updateCameraUI();
    }

    function updateCameraUI() {
      document.getElementById('item-label').textContent = `📦 Item ${currentItem + 1}`;
      const total = sessions.reduce((sum, s) => sum + s.photos.length, 0);
      const breakdown = sessions.map((s, i) => `Item ${i+1}: ${s.photos.length}`).join(' · ');
      document.getElementById('photo-count').textContent = `${total} photos  (${breakdown})`;
    }

    function doneCapturing() {
      stopCamera();
      // filter out empty groups
      sessions = sessions.filter(s => s.photos.length > 0);
      if (sessions.length === 0) {
        alert('No photos taken yet.');
        startCamera();
        return;
      }
      showReviewPage();
    }

    // ─── REVIEW ───────────────────────────────────────────────
    function showReviewPage() {
      showPage('review-page');
      const container = document.getElementById('review-groups');
      container.innerHTML = sessions.map((s, i) => `
        <div class="review-group" id="group-${i}">
          <h3>Item ${i + 1} — ${s.photos.length} photo${s.photos.length !== 1 ? 's' : ''}</h3>
          <div class="thumb-row">
            ${s.photos.map((p, pi) => `<img src="${p}" onclick="movePhotoPrompt(${i}, ${pi})">`).join('')}
          </div>
          <div class="review-actions">
            ${i > 0 ? `<button onclick="mergeWithPrevious(${i})">⬆ Merge with Item ${i}</button>` : ''}
            <button onclick="splitGroupPrompt(${i})">✂ Split</button>
          </div>
        </div>
      `).join('');

      // cost estimate
      const totalPhotosToSend = sessions.reduce((sum, s) =>
        sum + Math.min(s.photos.length, MAX_PHOTOS_PER_ITEM), 0);
      const estimate = (totalPhotosToSend * COST_PER_IMAGE).toFixed(3);
      document.getElementById('cost-estimate').textContent =
        `Estimated cost: ~$${estimate} (${totalPhotosToSend} photos sent to Claude)`;
    }

    function mergeWithPrevious(i) {
      sessions[i-1].photos = sessions[i-1].photos.concat(sessions[i].photos);
      sessions.splice(i, 1);
      showReviewPage();
    }

    function movePhotoPrompt(groupIndex, photoIndex) {
      const destinations = sessions
        .map((_, i) => i)
        .filter(i => i !== groupIndex)
        .map(i => `Item ${i + 1}`)
        .join(', ');
      if (!destinations) { alert('Only one item group exists.'); return; }
      const answer = prompt(`Move this photo to which item? (${destinations})`);
      if (!answer) return;
      const dest = parseInt(answer.replace('Item','').trim()) - 1;
      if (isNaN(dest) || dest < 0 || dest >= sessions.length || dest === groupIndex) {
        alert('Invalid choice.'); return;
      }
      const photo = sessions[groupIndex].photos.splice(photoIndex, 1)[0];
      sessions[dest].photos.push(photo);
      sessions = sessions.filter(s => s.photos.length > 0);
      showReviewPage();
    }

    function splitGroupPrompt(i) {
      const count = sessions[i].photos.length;
      if (count < 2) { alert('Need at least 2 photos to split.'); return; }
      const answer = prompt(`Split after which photo? Enter a number from 1 to ${count - 1}.`);
      const splitAt = parseInt(answer);
      if (isNaN(splitAt) || splitAt < 1 || splitAt >= count) {
        alert('Invalid number.'); return;
      }
      const second = sessions[i].photos.splice(splitAt);
      sessions.splice(i + 1, 0, { photos: second });
      showReviewPage();
    }

    // ─── GENERATE LISTINGS ────────────────────────────────────
    async function generateListings() {
      const totalPhotosToSend = sessions.reduce((sum, s) =>
        sum + Math.min(s.photos.length, MAX_PHOTOS_PER_ITEM), 0);
      const estimate = (totalPhotosToSend * COST_PER_IMAGE).toFixed(3);

      const confirmed = confirm(
        `This will send ${totalPhotosToSend} photos to Claude and cost approximately $${estimate}. Continue?`
      );
      if (!confirmed) return;

      // disable button while working
      const btn = document.querySelector('.generate-bar .btn');
      btn.textContent = 'Generating...';
      btn.disabled = true;

      for (let i = 0; i < sessions.length; i++) {
        btn.textContent = `Analyzing item ${i + 1} of ${sessions.length}...`;
        const session = sessions[i];
        // only send up to MAX_PHOTOS_PER_ITEM photos
        const photosToSend = session.photos.slice(0, MAX_PHOTOS_PER_ITEM);
        try {
          const result = await analyzePhotos(photosToSend);
          listings.unshift({
            id: Date.now() + i,
            title: result.title,
            description: result.description,
            photos: session.photos,
            status: 'ready'
          });
        } catch (e) {
          listings.unshift({
            id: Date.now() + i,
            title: 'Could not analyze item ' + (i + 1),
            description: 'Error: ' + e.message,
            photos: session.photos,
            status: 'draft'
          });
        }
      }

      showPage('library-page');
      renderLibrary();
    }

    // ─── CLAUDE API CALL ──────────────────────────────────────
    async function analyzePhotos(photos) {
      // build the message content — text prompt + images
      const content = [
        {
          type: 'text',
          text: `You are helping someone create a secondhand marketplace listing. 
Look at these photos of an item and return ONLY a JSON object with two fields:
- "title": a short descriptive listing title (max 80 characters)
- "description": a 3-5 sentence listing description mentioning brand, condition, size if visible, and key features.
Return only raw JSON, no markdown, no explanation.`
        },
        ...photos.map(p => ({
          type: 'image',
          source: {
            type: 'base64',
            media_type: 'image/jpeg',
            data: p.replace('data:image/jpeg;base64,', '')
          }
        }))
      ];

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 500,
          messages: [{ role: 'user', content }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error');
      }

      const data = await response.json();
      const text = data.content[0].text.trim();
      return JSON.parse(text);
    }

    // ─── DETAIL PAGE ──────────────────────────────────────────
    function openListing(index) {
      currentListing = index;
      const l = listings[index];
      document.getElementById('detail-status').textContent =
        l.status === 'ready' ? '✓ Ready to copy' : '⏳ Draft';
      document.getElementById('detail-status').className =
        'status-badge ' + (l.status === 'ready' ? 'status-ready' : 'status-draft');
      document.getElementById('detail-title').value = l.title || '';
      document.getElementById('detail-description').value = l.description || '';
      document.getElementById('detail-photos').innerHTML =
        l.photos.map(p => `<img src="${p}">`).join('');
      showPage('detail-page');
    }

    function copyListing() {
      // save any edits first
      listings[currentListing].title = document.getElementById('detail-title').value;
      listings[currentListing].description = document.getElementById('detail-description').value;
      const text =
        document.getElementById('detail-title').value + '\n\n' +
        document.getElementById('detail-description').value;
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard! Paste it into eBay, Grailed, or Reverb.');
      });
    }

    // ─── INIT ─────────────────────────────────────────────────
    if (!API_KEY) {
  const key = prompt('Enter your Anthropic API key to get started:');
  if (key) localStorage.setItem('anthropic_key', key);
  location.reload();
} else {
  showPage('library-page');
  renderLibrary();
}
  </script>

</body>
</html>
